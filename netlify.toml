# Next.js app lives at the REPOSITORY ROOT (not packages/cli).
# Netlify UI (Site settings → Build & deploy → Build settings):
#   - Package directory / "Site to deploy": leave EMPTY (monorepo picker must not be packages/cli)
#   - Base directory: empty (repo root)
#   - Build command: npm run build (or rely on this file)
#
# SSR Next.js on Netlify: publish must be `.next` and @netlify/plugin-nextjs must run.
# https://docs.netlify.com/build/frameworks/overview/#next-js
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify Forms: Site settings → Forms → Usage and configuration → Form detection → Enable.
# The contact form is JS-rendered; public/__forms.html is scanned at deploy; POST must target /__forms.html (not /).
