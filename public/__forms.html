<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Netlify Forms registration</title>
  </head>
  <body>
    <!--
      Deploy-time only: Netlify scans this static file so the "contact" form exists.
      Submissions must POST to this URL (not /) — see ContactNetlifyForm.
      https://opennext.js.org/netlify/forms
    -->
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/contact/thanks"
      hidden
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="contact" />
      <p style="position: absolute; left: -10000px">
        <label>Do not fill: <input name="bot-field" tabindex="-1" autocomplete="off" /></label>
      </p>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
