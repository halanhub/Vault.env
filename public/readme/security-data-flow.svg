<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Vault.env: encryption in the browser before data reaches Firebase">
  <defs>
    <style>
      .box { fill: #fff; stroke: #1a1a1a; stroke-width: 2; }
      .mint { fill: #c1f0c1; stroke: #1a1a1a; stroke-width: 2; }
      .txt { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #1a1a1a; }
      .small { font-size: 12px; fill: #374151; }
      .arrow { stroke: #1a1a1a; stroke-width: 2; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#fdfcf0"/>
  <text x="360" y="28" text-anchor="middle" class="txt" font-weight="700" font-size="16">What leaves your machine (TLS) vs what Firebase can read</text>

  <rect class="mint" x="24" y="56" width="200" height="100" rx="12"/>
  <text x="124" y="88" text-anchor="middle" class="txt" font-weight="700">Your browser</text>
  <text x="124" y="112" text-anchor="middle" class="small">Web Crypto: PBKDF2 + AES-GCM</text>
  <text x="124" y="136" text-anchor="middle" class="small">Plaintext only in memory</text>

  <path class="arrow" d="M 230 106 L 290 106"/>
  <text x="260" y="98" text-anchor="middle" class="small">HTTPS</text>

  <rect class="box" x="300" y="56" width="200" height="100" rx="12"/>
  <text x="400" y="88" text-anchor="middle" class="txt" font-weight="700">On the wire</text>
  <text x="400" y="112" text-anchor="middle" class="small">Ciphertext + IV + salt</text>
  <text x="400" y="136" text-anchor="middle" class="small">(and auth session tokens)</text>

  <path class="arrow" d="M 506 106 L 566 106"/>

  <rect class="box" x="576" y="56" width="120" height="100" rx="12"/>
  <text x="636" y="92" text-anchor="middle" class="txt" font-weight="700">Firestore /</text>
  <text x="636" y="112" text-anchor="middle" class="txt" font-weight="700">Storage</text>
  <text x="636" y="140" text-anchor="middle" class="small">Opaque blobs</text>

  <rect x="24" y="180" width="672" height="80" rx="12" fill="#fef3c7" stroke="#1a1a1a" stroke-width="2"/>
  <text x="360" y="208" text-anchor="middle" class="txt" font-weight="700">Master password</text>
  <text x="360" y="232" text-anchor="middle" class="small">Never sent to Vault.env servers as a secret for decryption; used only locally to derive keys.</text>
</svg>
