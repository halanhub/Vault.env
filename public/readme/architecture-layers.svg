<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="Layers: UI, crypto, Firebase">
  <rect width="640" height="320" fill="#fdfcf0"/>
  <defs>
    <style>
      .layer { stroke: #1a1a1a; stroke-width: 2; rx: 14; }
      .t { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; fill: #1a1a1a; }
      .h { font-weight: 700; font-size: 15px; }
    </style>
  </defs>
  <text x="320" y="32" text-anchor="middle" class="t h">Architecture (simplified)</text>

  <rect class="layer" x="48" y="52" width="544" height="56" fill="#fff"/>
  <text x="320" y="86" text-anchor="middle" class="t">Next.js UI - projects, secrets grid, lock screen, CLI sync hints</text>

  <rect class="layer" x="48" y="124" width="544" height="72" fill="#c1f0c1"/>
  <text x="320" y="152" text-anchor="middle" class="t h">Client-side crypto (@vaultenv/crypto)</text>
  <text x="320" y="176" text-anchor="middle" class="t">AES-256-GCM, PBKDF2 (600k), unique salt + IV per value / file</text>

  <rect class="layer" x="48" y="212" width="544" height="88" fill="#fff"/>
  <text x="320" y="242" text-anchor="middle" class="t h">Firebase (Google)</text>
  <text x="320" y="266" text-anchor="middle" class="t">Auth (identity) - Firestore metadata + ciphertext - Storage for encrypted files</text>
  <text x="320" y="288" text-anchor="middle" class="t">Firestore rules scope data to the authenticated uid</text>
</svg>
